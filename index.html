<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gradient Generator</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:#000;
  font-family:Arial;
}

#scene{
  width:100%;
  height:100%;
  position:relative;
  overflow:hidden;
  filter:blur(0px);
}

.circle{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  animation:move 12s infinite alternate ease-in-out;
}

@keyframes move{
  0%{
    transform:translate(0,0) scale(1);
  }
  50%{
    transform:translate(300px,-150px) scale(1.4);
  }
  100%{
    transform:translate(-200px,200px) scale(.9);
  }
}


.panel{
  position:fixed;
  top:20px;
  left:20px;
  background:#ffffff22;
  backdrop-filter:blur(20px);
  padding:15px;
  border-radius:20px;
  color:white;
  z-index:10;
}

button{
  border:0;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="scene"></div>

<div class="panel">
  <button onclick="addCircle()">+ Круг</button>
  <button onclick="randomize()">🎨 Случайно</button>
</div>


<script>

const scene=document.getElementById("scene");


let colors=[
 "#ff0080",
 "#7928ca",
 "#00ffff",
 "#00ff88",
 "#ffcc00"
];


function addCircle(){

 let c=document.createElement("div");

 c.className="circle";

 let size=Math.random()*400+200;

 c.style.width=size+"px";
 c.style.height=size+"px";

 c.style.left=Math.random()*90+"%";
 c.style.top=Math.random()*90+"%";

 c.style.background=
 `radial-gradient(circle, 
 ${colors[Math.floor(Math.random()*colors.length)]},
 transparent 70%)`;

 c.style.animationDuration=
 Math.random()*10+8+"s";

 scene.appendChild(c);

}



function randomize(){

 scene.innerHTML="";

 for(let i=0;i<7;i++){
   addCircle();
 }

}


randomize();

</script>

</body>
</html>
