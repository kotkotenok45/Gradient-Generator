<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Gradient Generator</title>

<style>

body{
 margin:0;
 overflow:hidden;
 background:#050018;
}


canvas{
 position:fixed;
 inset:0;
}

</style>

</head>


<body>

<canvas id="c"></canvas>


<script>

const canvas =
document.getElementById("c");

const ctx =
canvas.getContext("2d");


let w,h;

function resize(){

 w=canvas.width=innerWidth;
 h=canvas.height=innerHeight;

}

resize();

onresize=resize;



let blobs=[];


let colors=[
 [255,0,140],
 [120,40,255],
 [0,220,255],
 [0,255,160],
 [255,220,0]
];



class Blob{

constructor(side){

 this.r=150+Math.random()*300;

 this.speed=.002+Math.random()*.004;

 this.t=Math.random()*100;


 let c=
 colors[
 Math.floor(Math.random()*colors.length)
 ];

 this.color=c;


 if(side==0){

  this.x=-300;
  this.y=Math.random()*h;

  this.dx=1;

 }

 else if(side==1){

  this.x=w+300;
  this.y=Math.random()*h;

  this.dx=-1;

 }

 else if(side==2){

  this.x=Math.random()*w;
  this.y=-300;

  this.dy=1;

 }

 else{

  this.x=Math.random()*w;
  this.y=h+300;

  this.dy=-1;

 }


}


update(){

 this.t+=this.speed;

 this.x+=Math.sin(this.t)*1.2;

 this.y+=Math.cos(this.t)*1.2;


}


draw(){


let g =
ctx.createRadialGradient(
this.x,this.y,0,
this.x,this.y,this.r
);


let c=this.color;


g.addColorStop(
0,
`rgba(${c},0.9)`
);


g.addColorStop(
1,
"rgba(0,0,0,0)"
);



ctx.fillStyle=g;

ctx.beginPath();

ctx.arc(
this.x,
this.y,
this.r,
0,
Math.PI*2
);

ctx.fill();


}

}



function spawn(){

 blobs.push(
 new Blob(
 Math.floor(Math.random()*4)
 )
 );

}


for(let i=0;i<15;i++)
spawn();



setInterval(spawn,1500);



function animate(){

requestAnimationFrame(animate);


ctx.clearRect(0,0,w,h);



let bg =
ctx.createLinearGradient(
0,0,w,h
);


bg.addColorStop(
0,
"#12002f"
);

bg.addColorStop(
.5,
"#002b4f"
);

bg.addColorStop(
1,
"#200018"
);


ctx.fillStyle=bg;

ctx.fillRect(0,0,w,h);



ctx.globalCompositeOperation="lighter";


blobs.forEach(b=>{

 b.update();
 b.draw();

});


ctx.globalCompositeOperation="source-over";


}



animate();


</script>


</body>
</html>
